
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Realtime Django WebSocket</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 40px auto;
        }
        #chat, #notifications {
            border: 1px solid #ccc;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
        }
        input {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<h2>👥 Онлайн: <span id="online">0</span></h2>

<h3>🔔 Notifications</h3>
<div id="notifications"></div>

<h3>💬 Chat</h3>
<div id="chat"></div>

<input id="messageInput" type="text" placeholder="Введи повідомлення...">
<br>
<button onclick="sendMessage()">📨 Відправити повідомлення</button>
<button onclick="sendNotification()">🔔 Notify всіх</button>

<script>
    const socket = new WebSocket("ws://127.0.0.1:8000/ws/realtime/");

    socket.onopen = function() {
        console.log("✅ WebSocket підключено");
    };

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);
        console.log("📩", data);


        if (data.type === "online_count") {
            document.getElementById("online").innerText = data.count;
        }


        if (data.type === "notification") {
            const div = document.createElement("div");
            div.textContent = "🔔 " + data.message;
            document.getElementById("notifications").appendChild(div);
        }


        if (data.type === "chat") {
            const div = document.createElement("div");
            div.textContent = data.username + ": " + data.message;
            document.getElementById("chat").appendChild(div);
        }


        if (data.error) {
            alert(data.error);
        }
    };

    socket.onclose = function() {
        console.log("❌ WebSocket закрито");
    };

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value;

        socket.send(JSON.stringify({
            action: "chat",
            message: message
        }));

        input.value = "";
    }

    function sendNotification() {
        socket.send(JSON.stringify({
            action: "notify",
            message: "🔥 Нове повідомлення для всіх!"
        }));
    }
</script>

</body>
</html>

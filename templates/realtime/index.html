
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realtime App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat { border: 1px solid #ccc; padding: 10px; width: 400px; height: 300px; overflow-y: scroll; }
        #notifications { border: 1px solid #ffcc00; padding: 10px; width: 400px; height: 100px; overflow-y: scroll; margin-top: 10px; }
        #online-count { font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Realtime App</h1>
    <div id="online-count">Online users: 0</div>

    <div id="chat"></div>
    <input type="text" id="chat-input" placeholder="Type message..." />
    <button id="send-chat">Send Chat</button>

    <div id="notifications"></div>
    <input type="text" id="notification-input" placeholder="Notification message..." />
    <button id="send-notification">Send Notification</button>

    <script>
        const wsScheme = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${wsScheme}://${window.location.host}/ws/main/`);

        const onlineCountEl = document.getElementById("online-count");
        const chatEl = document.getElementById("chat");
        const notificationsEl = document.getElementById("notifications");

        socket.onopen = () => console.log("WebSocket connected");

        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "online") {
                onlineCountEl.textContent = "Online users: " + data.count;
            } else if (data.type === "chat") {
                const msg = document.createElement("div");
                msg.textContent = `${data.username}: ${data.message}`;
                chatEl.appendChild(msg);
                chatEl.scrollTop = chatEl.scrollHeight;
            } else if (data.type === "notification") {
                const note = document.createElement("div");
                note.textContent = `Notification: ${data.message}`;
                notificationsEl.appendChild(note);
                notificationsEl.scrollTop = notificationsEl.scrollHeight;
            } else if (data.type === "error") {
                alert(data.message);
            }
        };

        socket.onclose = (event) => console.log("WebSocket disconnected", event);

        document.getElementById("send-chat").onclick = () => {
            const input = document.getElementById("chat-input");
            if (input.value.trim()) {
                socket.send(JSON.stringify({ type: "chat", message: input.value }));
                input.value = "";
            }
        };

        document.getElementById("send-notification").onclick = () => {
            const input = document.getElementById("notification-input");
            if (input.value.trim()) {
                socket.send(JSON.stringify({ type: "notification", message: input.value }));
                input.value = "";
            }
        };


        document.getElementById("chat-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("send-chat").click();
        });
        document.getElementById("notification-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("send-notification").click();
        });
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
</head>
<body>
<h1>Список книг</h1>
<ul>
{% for book in books %}
    <li>
        <strong>{{ book.title }}</strong> ({{ book.publication_year }})<br>
        Автор: {{ book.author.name }}<br>
        Відгуки:
        <ul>
        {% for review in book.reviews.all %}
            <li>{{ review.text }} ({{ review.rating }}/5)</li>
        {% endfor %}
        </ul>
    </li>
{% endfor %}
</ul>
</body>
</html>

{% extends 'security/base.html' %}

{% block content %}
<h2>SQL Injection Safe Example</h2>

<form method="get">
    <input type="text" name="username" placeholder="Enter username">
    <button type="submit">Search</button>
</form>

{% if result %}
    <h3>Results:</h3>
    <ul>
        {% for row in result %}
            <li>{{ row.0 }}</li>
        {% endfor %}
    </ul>
{% endif %}

{% endblock %}
